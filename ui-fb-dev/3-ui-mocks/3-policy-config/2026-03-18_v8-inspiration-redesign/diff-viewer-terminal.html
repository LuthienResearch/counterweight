<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concept 2: The Diff Viewer — Terminal Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b;
      font-family: 'JetBrains Mono', monospace;
      color: #ccc;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      color: #2563eb;
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 24px;
      font-family: 'JetBrains Mono', monospace;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .description {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 32px;
      font-family: 'JetBrains Mono', monospace;
    }

    .svg-wrapper {
      width: 100%;
    }

    .svg-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px;
      }

      .description {
        padding: 12px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to all concepts</a>

    <div class="description">
      Every response is a diff. Luthien shows what changed and why — like git diff --stat for your AI output.
    </div>

    <div class="svg-wrapper">
      <svg viewBox="0 0 620 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
            .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
            .mono-bold { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; font-weight: 700; }

            @keyframes blink {
              0%, 100% { opacity: 0.6; }
              50% { opacity: 0; }
            }
            .cursor-blink { animation: blink 1.1s step-end infinite; }
          </style>
        </defs>

        <!-- Terminal background -->
        <rect width="620" height="720" rx="8" fill="#1e1e1e"/>

        <!-- Title bar -->
        <rect width="620" height="32" rx="8" fill="#323233"/>
        <!-- Square off bottom corners of title bar -->
        <rect y="24" width="620" height="8" fill="#323233"/>

        <!-- Traffic lights -->
        <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
        <circle cx="40" cy="16" r="6" fill="#febc2e"/>
        <circle cx="60" cy="16" r="6" fill="#28c840"/>

        <!-- Title bar text -->
        <text x="310" y="20" text-anchor="middle" class="mono" font-size="13">
          <tspan fill="#808080">claude code +</tspan>
          <tspan fill="#4ec9b0"> Luthien</tspan>
        </text>

        <!-- ============================================ -->
        <!-- Scene 1: Response with diff summary          -->
        <!-- ============================================ -->

        <!-- $ luthien claude -->
        <text x="20" y="64" class="mono" font-size="13">
          <tspan fill="#4ec9b0">$</tspan>
          <tspan fill="#d4d4d4"> luthien claude</tspan>
        </text>

        <!-- Startup info -->
        <text x="20" y="84" class="mono" font-size="12" fill="#808080">Connected to Luthien proxy (localhost:8000)</text>
        <text x="20" y="100" class="mono" font-size="12" fill="#808080">Policies: DeSlop (default)</text>

        <!-- User prompt -->
        <text x="20" y="130" class="mono" font-size="13">
          <tspan fill="#4ec9b0">&#10095;</tspan>
          <tspan fill="#d4d4d4"> Refactor the auth module to use async/await</tspan>
        </text>

        <!-- Claude response -->
        <text x="20" y="158" class="mono" font-size="12">
          <tspan fill="#4ec9b0">&#9679;</tspan>
          <tspan fill="#d4d4d4"> Edit</tspan>
          <tspan fill="#808080"> (src/auth.py)</tspan>
        </text>
        <text x="36" y="176" class="mono" font-size="12" fill="#808080">&#9492; Modified 3 functions</text>

        <!-- Luthien diff-stat line -->
        <text x="20" y="204" class="mono" font-size="12">
          <tspan fill="#febc2e">[Luthien]</tspan>
          <tspan fill="#4ade80" class="mono-bold"> 4 changes</tspan>
          <tspan fill="#d4a545">: em-dash x2, curly quotes x2</tspan>
        </text>

        <!-- Scene separator 1 -->
        <line x1="20" y1="224" x2="600" y2="224" stroke="#444444" stroke-width="1"/>

        <!-- ============================================ -->
        <!-- Scene 2: /luthien diff expansion             -->
        <!-- ============================================ -->

        <!-- User command -->
        <text x="20" y="250" class="mono" font-size="13">
          <tspan fill="#4ec9b0">&#10095;</tspan>
          <tspan fill="#d4d4d4"> /luthien diff</tspan>
        </text>

        <!-- Diff header -->
        <text x="20" y="274" class="mono" font-size="12" fill="#808080">Last response — 4 changes by DeSlop:</text>

        <!-- Diff line 1 -->
        <text x="30" y="302" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// The refresh logic </tspan>
          <tspan fill="#f87171">&#8212;</tspan>
          <tspan fill="#d4d4d4"> which was</tspan>
        </text>
        <text x="330" y="302" class="mono" font-size="11" fill="#444444">&#9474;</text>
        <text x="346" y="302" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// The refresh logic </tspan>
          <tspan fill="#4ade80">-</tspan>
          <tspan fill="#d4d4d4"> which was</tspan>
        </text>

        <!-- Diff line 2 -->
        <text x="30" y="320" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// rewritten in v3.2 </tspan>
          <tspan fill="#f87171">&#8212;</tspan>
          <tspan fill="#d4d4d4"> now handles</tspan>
        </text>
        <text x="330" y="320" class="mono" font-size="11" fill="#444444">&#9474;</text>
        <text x="346" y="320" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// rewritten in v3.2 </tspan>
          <tspan fill="#4ade80">-</tspan>
          <tspan fill="#d4d4d4"> now handles</tspan>
        </text>

        <!-- Diff line 3 -->
        <text x="30" y="338" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// the token</tspan>
          <tspan fill="#f87171">&#8217;</tspan>
          <tspan fill="#d4d4d4">s </tspan>
          <tspan fill="#f87171">&#8220;</tspan>
          <tspan fill="#d4d4d4">scope</tspan>
          <tspan fill="#f87171">&#8221;</tspan>
          <tspan fill="#d4d4d4"> field</tspan>
        </text>
        <text x="330" y="338" class="mono" font-size="11" fill="#444444">&#9474;</text>
        <text x="346" y="338" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// the token</tspan>
          <tspan fill="#4ade80">'</tspan>
          <tspan fill="#d4d4d4">s </tspan>
          <tspan fill="#4ade80">"</tspan>
          <tspan fill="#d4d4d4">scope</tspan>
          <tspan fill="#4ade80">"</tspan>
          <tspan fill="#d4d4d4"> field</tspan>
        </text>

        <!-- Diff line 4 -->
        <text x="30" y="356" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// the retry delay </tspan>
          <tspan fill="#f87171">&#8212;</tspan>
          <tspan fill="#d4d4d4"> currently</tspan>
        </text>
        <text x="330" y="356" class="mono" font-size="11" fill="#444444">&#9474;</text>
        <text x="346" y="356" class="mono" font-size="11">
          <tspan fill="#d4d4d4">// the retry delay </tspan>
          <tspan fill="#4ade80">-</tspan>
          <tspan fill="#d4d4d4"> currently</tspan>
        </text>

        <!-- Diff summary -->
        <text x="150" y="388" class="mono" font-size="11" fill="#808080">-- 2 em-dashes, 2 curly quotes --</text>

        <!-- Scene separator 2 -->
        <line x1="20" y1="408" x2="600" y2="408" stroke="#444444" stroke-width="1"/>

        <!-- ============================================ -->
        <!-- Scene 3: /luthien config                     -->
        <!-- ============================================ -->

        <!-- User command -->
        <text x="20" y="434" class="mono" font-size="13">
          <tspan fill="#4ec9b0">&#10095;</tspan>
          <tspan fill="#d4d4d4"> /luthien config deslop</tspan>
        </text>

        <!-- Config header -->
        <text x="20" y="460" class="mono" font-size="12" fill="#d4d4d4">DeSlop rules:</text>

        <!-- Rule 1 -->
        <text x="36" y="484" class="mono" font-size="12">
          <tspan fill="#808080">1.</tspan>
          <tspan fill="#d4d4d4"> em-dash (</tspan>
          <tspan fill="#d4d4d4">&#8212;</tspan>
          <tspan fill="#d4d4d4">) &#8594; hyphen (-)</tspan>
        </text>
        <text x="440" y="484" class="mono" font-size="12" fill="#4ade80">47 hits</text>

        <!-- Rule 2 -->
        <text x="36" y="504" class="mono" font-size="12">
          <tspan fill="#808080">2.</tspan>
          <tspan fill="#d4d4d4"> en-dash (</tspan>
          <tspan fill="#d4d4d4">&#8211;</tspan>
          <tspan fill="#d4d4d4">) &#8594; hyphen (-)</tspan>
        </text>
        <text x="440" y="504" class="mono" font-size="12" fill="#4ade80">12 hits</text>

        <!-- Rule 3 -->
        <text x="36" y="524" class="mono" font-size="12">
          <tspan fill="#808080">3.</tspan>
          <tspan fill="#d4d4d4"> curly quotes (</tspan>
          <tspan fill="#d4d4d4">&#8220;&#8221;</tspan>
          <tspan fill="#d4d4d4">) &#8594; straight</tspan>
        </text>
        <text x="440" y="524" class="mono" font-size="12" fill="#4ade80">31 hits</text>

        <!-- Rule 4 -->
        <text x="36" y="544" class="mono" font-size="12">
          <tspan fill="#808080">4.</tspan>
          <tspan fill="#d4d4d4"> smart apostrophe (</tspan>
          <tspan fill="#d4d4d4">&#8217;</tspan>
          <tspan fill="#d4d4d4">) &#8594; straight</tspan>
        </text>
        <text x="440" y="544" class="mono" font-size="12" fill="#4ade80">28 hits</text>

        <!-- Menu options -->
        <text x="36" y="576" class="mono" font-size="12">
          <tspan fill="#808080">[</tspan>
          <tspan fill="#4ec9b0">a</tspan>
          <tspan fill="#808080">]dd rule  [</tspan>
          <tspan fill="#4ec9b0">r</tspan>
          <tspan fill="#808080">]emove rule  [</tspan>
          <tspan fill="#4ec9b0">b</tspan>
          <tspan fill="#808080">]ack</tspan>
        </text>

        <!-- User input: add rule -->
        <text x="20" y="608" class="mono" font-size="13">
          <tspan fill="#4ec9b0">&#10095;</tspan>
          <tspan fill="#d4d4d4"> a</tspan>
        </text>

        <!-- Pattern prompt -->
        <text x="36" y="630" class="mono" font-size="12">
          <tspan fill="#808080">Pattern:</tspan>
          <tspan fill="#d4d4d4"> utilize</tspan>
        </text>

        <!-- Replace prompt -->
        <text x="36" y="650" class="mono" font-size="12">
          <tspan fill="#808080">Replace:</tspan>
          <tspan fill="#d4d4d4"> use</tspan>
        </text>

        <!-- Success message -->
        <text x="36" y="674" class="mono" font-size="12" fill="#28c840">&#10003; Rule added: "utilize" &#8594; "use"</text>

        <!-- Bottom cursor -->
        <text x="20" y="702" class="mono" font-size="13" fill="#4ec9b0">$</text>
        <rect x="34" y="690" width="8" height="16" rx="1" fill="#4ec9b0" class="cursor-blink"/>

      </svg>
    </div>
  </div>
</body>
</html>
